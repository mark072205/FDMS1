security:
  password_hashers:
    Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: auto
    App\Entity\Users:
      algorithm: auto

  providers:
    app_user_provider:
      id: App\Security\LoginAuthenticator

  firewalls:
    dev:
      pattern: ^/(_(profiler|wdt)|css|images|js)/
      security: false

    api:
            pattern: ^/api
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login
                username_path: username
                password_path: password
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure
            jwt: ~

    main:
      lazy: true
      provider: app_user_provider
      form_login:
        login_path: app_login
        check_path: app_login
        username_parameter: _identifier
        success_handler: App\Security\LoginAuthenticator
        failure_handler: App\Security\LoginAuthenticationFailureHandler
        enable_csrf: true
      logout:
        path: app_logout
        target: app_login

  access_control:

    - { path: ^/api/login, roles: PUBLIC_ACCESS }
    - { path: ^/api, roles: IS_AUTHENTICATED }

    - { path: ^/verify-email, roles: PUBLIC_ACCESS }
    - { path: ^/signup, roles: PUBLIC_ACCESS }

    - path: ^/dashboard
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/category
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/projects
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/proposals
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/users
      roles: ROLE_ADMIN

    - path: ^/files
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/settings
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/notifications
      roles: ROLE_ADMIN

    - path: ^/search
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/bulk-operations
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/analytics
      roles: [ROLE_ADMIN, ROLE_STAFF]

    - path: ^/activity-logs
      roles: ROLE_ADMIN

    - path: ^/client
      roles: ROLE_CLIENT

    - path: ^/designer
      roles: ROLE_DESIGNER

when@test:
  security:
    password_hashers:
      Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
        algorithm: auto
        cost: 4
        time_cost: 3
        memory_cost: 10
