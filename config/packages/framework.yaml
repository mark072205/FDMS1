# see https://symfony.com/doc/current/reference/configuration/framework.html
framework:
    secret: '%env(APP_SECRET)%'
    
    # Trust all proxies (required for ngrok) - use '*' for development, specific IPs for production
    trusted_proxies: '*'
    trusted_headers: ['x-forwarded-for', 'x-forwarded-port', 'x-forwarded-proto', 'x-forwarded-host']

    # Note that the session will be started ONLY if you read or write from it.
    session:
        enabled: true
        # Session cookie settings - expires when browser closes
        cookie_lifetime: 0  # Session expires when browser closes
        cookie_httponly: true
        cookie_secure: true  # Set to true for HTTPS (required for ngrok)
        cookie_samesite: none  # Set to 'none' to allow cross-domain cookies (required for ngrok)
        cookie_path: '/'  # Set cookie path to root
        # cookie_domain: null  # Don't set domain (allows cookies to work with any domain including ngrok)
        name: SESSID

    #esi: true
    #fragments: true

when@test:
    framework:
        test: true
        session:
            storage_factory_id: session.storage.factory.mock_file
